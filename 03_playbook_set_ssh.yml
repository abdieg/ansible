---
- name: Configure hardened SSH (sshd_config)
  hosts: all
  become: yes
  gather_facts: yes
  
  pre_tasks:
    - name: Verify system compatibility
      assert:
        that:
          - ansible_distribution == "Debian"
          - ansible_distribution_version is version('13', '>=')
        fail_msg: "This playbook requires Debian 13 or later"

    - name: Display pre-configuration information
      debug:
        msg: |
          SSH Hardening Configuration:
          ═══════════════════════════════════════════════════════════
          System: {{ ansible_distribution }} {{ ansible_distribution_version }}
          Hostname: {{ ansible_hostname }}
          Current SSH Port: {{ ansible_port | default(22) }}
          New SSH Port: 64100
          
          ⚠ WARNING: This will change SSH to port 64100
          Make sure you have physical access or another way to connect
          if something goes wrong!
          ═══════════════════════════════════════════════════════════

  tasks:
    - name: Install openssh-server
      apt:
        name: openssh-server
        state: present
        update_cache: yes
        cache_valid_time: 3600
      register: openssh_install
      retries: 3
      delay: 5
      until: openssh_install is succeeded

    - name: Create backup of original sshd_config
      copy:
        src: /etc/ssh/sshd_config
        dest: /etc/ssh/sshd_config.bak.{{ ansible_date_time.iso8601_basic_short }}
        remote_src: yes
        owner: root
        group: root
        mode: '0600'
      register: backup_result

    - name: Verify backup was created
      stat:
        path: /etc/ssh/sshd_config.bak.{{ ansible_date_time.iso8601_basic_short }}
      register: backup_file
      failed_when: not backup_file.stat.exists

    - name: Create new hardened sshd_config
      copy:
        dest: /etc/ssh/sshd_config
        owner: root
        group: root
        mode: '0600'
        content: |
          # Hardened sshd_config for Debian 13
          # Generated by Ansible on {{ ansible_date_time.iso8601 }}
          # Based on dev-sec/ssh-baseline InSpec profile
          
          # --- Network & Connectivity ---
          Port 64100
          AddressFamily inet
          ListenAddress 0.0.0.0
          
          # --- Logging ---
          SyslogFacility AUTH
          LogLevel VERBOSE
          
          # --- Authentication ---
          LoginGraceTime 30s
          StrictModes yes
          MaxAuthTries 2
          MaxSessions 5
          PermitRootLogin no
          PubkeyAuthentication no
          PasswordAuthentication yes
          PermitEmptyPasswords no
          KbdInteractiveAuthentication no
          ChallengeResponseAuthentication no
          
          # --- Kerberos ---
          KerberosAuthentication no
          KerberosOrLocalPasswd no
          KerberosTicketCleanup yes
          
          # --- GSSAPI ---
          GSSAPIAuthentication no
          GSSAPICleanupCredentials yes
          
          # --- Rhosts & Host-based ---
          IgnoreRhosts yes
          IgnoreUserKnownHosts yes
          HostbasedAuthentication no
          
          # --- Environment & Privilege ---
          PermitUserEnvironment no
          UsePAM yes
          
          # --- Forwarding & Tunnels ---
          AllowTcpForwarding no
          AllowAgentForwarding no
          GatewayPorts no
          PermitTunnel no
          X11Forwarding no
          X11UseLocalhost yes
          
          # --- Session & Keepalive ---
          TCPKeepAlive no
          ClientAliveInterval 300
          ClientAliveCountMax 3
          MaxStartups 10:30:60
          
          # --- Display ---
          PrintMotd no
          PrintLastLog no
          Banner none
          DebianBanner no
          
          # --- Locale ---
          AcceptEnv LANG LC_*
          
          # --- Subsystem ---
          Subsystem sftp /usr/lib/openssh/sftp-server
      notify: Restart SSH service

    - name: Configuration summary
      debug:
        msg: |
          SSH Configuration Applied:
          ✓ Port changed to 64100
          ✓ Password authentication enabled
          ✓ Root login disabled
          ✓ Public key authentication disabled
          ✓ All forwarding disabled
          ✓ Hardened security settings applied

    - name: Set permissions on /etc/ssh directory
      file:
        path: /etc/ssh
        mode: '0755'
        owner: root
        group: root

    - name: Set permissions on sshd_config file
      file:
        path: /etc/ssh/sshd_config
        mode: '0600'
        owner: root
        group: root

    - name: Validate sshd_config syntax
      block:
        - name: Test sshd configuration
          command: sshd -t
          register: sshd_validation
          changed_when: false

        - name: Configuration is valid
          debug:
            msg: "✓ SSH configuration is valid and ready to apply"

      rescue:
        - name: Configuration validation failed
          debug:
            msg: "✗ SSH configuration has errors. Rolling back..."

        - name: Restore backup configuration
          copy:
            src: /etc/ssh/sshd_config.bak.{{ ansible_date_time.iso8601_basic_short }}
            dest: /etc/ssh/sshd_config
            remote_src: yes
            owner: root
            group: root
            mode: '0600'

        - name: Fail the playbook
          fail:
            msg: "SSH configuration validation failed. Original config restored. Check /etc/ssh/sshd_config.bak for details"

  handlers:
    - name: Restart SSH service
      systemd:
        name: ssh
        state: restarted
        enabled: yes
      listen: Restart SSH service

  post_tasks:
    - name: Verify SSH service is running
      systemd:
        name: ssh
        state: started
      register: ssh_status

    - name: Check SSH is listening on new port
      wait_for:
        port: 64100
        timeout: 10
      register: port_check
      ignore_errors: yes

    - name: Port verification status
      debug:
        msg: "{{ '✓ SSH is listening on port 64100' if port_check is succeeded else '⚠ Could not verify port 64100 is listening' }}"

    - name: Display completion message
      debug:
        msg: |
          ✓ SSH hardening completed successfully
          ✓ SSH is running on port 64100
          ✓ Configuration backed up to: /etc/ssh/sshd_config.bak.{{ ansible_date_time.iso8601_basic_short }}
          
          ⚠ IMPORTANT NEXT STEPS:
          1. Update your ansible inventory to use port 64100:
             ansible_port=64100
          
          2. Test SSH connection in a NEW terminal before closing this one:
             ssh -p 64100 {{ ansible_user }}@{{ ansible_host }}
          
          3. If connection fails, you can restore the backup:
             sudo cp /etc/ssh/sshd_config.bak.{{ ansible_date_time.iso8601_basic_short }} /etc/ssh/sshd_config
             sudo systemctl restart ssh
          
          4. Update firewall rules if using UFW:
             sudo ufw allow from YOUR_IP to any port 64100
             sudo ufw delete allow 22/tcp  # Remove old rule after testing