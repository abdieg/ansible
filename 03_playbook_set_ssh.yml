---
- name: Configure hardened SSH (sshd_config)
  hosts: all
  become: yes
  gather_facts: yes
  
  pre_tasks:
    - name: Check if running on Debian-based system
      assert:
        that:
          - ansible_os_family == "Debian"
        fail_msg: "This playbook is designed for Debian-based systems"

  tasks:
    - name: Install openssh-server
      apt:
        name: openssh-server
        state: present
        update_cache: yes

    - name: Create backup of original sshd_config
      copy:
        src: /etc/ssh/sshd_config
        dest: /etc/ssh/sshd_config.bak.{{ ansible_date_time.iso8601_basic_short }}
        remote_src: yes
        owner: root
        group: root
        mode: '0600'

    - name: Remove any conflicting commented lines in sshd_config
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?{{ item.key }}\\s"
        state: absent
      loop:
        - { key: "Port" }
        - { key: "AddressFamily" }
        - { key: "ListenAddress" }
        - { key: "SyslogFacility" }
        - { key: "LogLevel" }
        - { key: "LoginGraceTime" }
        - { key: "StrictModes" }
        - { key: "MaxAuthTries" }
        - { key: "MaxSessions" }
        - { key: "PermitRootLogin" }
        - { key: "PubkeyAuthentication" }
        - { key: "PasswordAuthentication" }
        - { key: "PermitEmptyPasswords" }
        - { key: "KbdInteractiveAuthentication" }
        - { key: "ChallengeResponseAuthentication" }
        - { key: "KerberosAuthentication" }
        - { key: "KerberosOrLocalPasswd" }
        - { key: "KerberosTicketCleanup" }
        - { key: "GSSAPIAuthentication" }
        - { key: "GSSAPICleanupCredentials" }
        - { key: "IgnoreRhosts" }
        - { key: "IgnoreUserKnownHosts" }
        - { key: "HostbasedAuthentication" }
        - { key: "PermitUserEnvironment" }
        - { key: "UsePAM" }
        - { key: "AllowTcpForwarding" }
        - { key: "AllowAgentForwarding" }
        - { key: "GatewayPorts" }
        - { key: "PermitTunnel" }
        - { key: "X11Forwarding" }
        - { key: "X11UseLocalhost" }
        - { key: "TCPKeepAlive" }
        - { key: "ClientAliveInterval" }
        - { key: "ClientAliveCountMax" }
        - { key: "MaxStartups" }
        - { key: "PrintMotd" }
        - { key: "PrintLastLog" }
        - { key: "Banner" }
        - { key: "DebianBanner" }
        - { key: "AcceptEnv" }
        - { key: "Subsystem" }

    - name: Configure hardened sshd settings
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?{{ item.key }}\\s"
        line: "{{ item.key }} {{ item.value }}"
        state: present
      loop:
        # Network & Connectivity
        - { key: "Port", value: "64100" }
        - { key: "AddressFamily", value: "inet" }
        - { key: "ListenAddress", value: "0.0.0.0" }
        
        # Logging
        - { key: "SyslogFacility", value: "AUTH" }
        - { key: "LogLevel", value: "VERBOSE" }
        
        # Authentication
        - { key: "LoginGraceTime", value: "30s" }
        - { key: "StrictModes", value: "yes" }
        - { key: "MaxAuthTries", value: "2" }
        - { key: "MaxSessions", value: "5" }
        - { key: "PermitRootLogin", value: "no" }
        - { key: "PubkeyAuthentication", value: "no" }
        - { key: "PasswordAuthentication", value: "yes" }
        - { key: "PermitEmptyPasswords", value: "no" }
        - { key: "KbdInteractiveAuthentication", value: "no" }
        - { key: "ChallengeResponseAuthentication", value: "no" }
        
        # Kerberos
        - { key: "KerberosAuthentication", value: "no" }
        - { key: "KerberosOrLocalPasswd", value: "no" }
        - { key: "KerberosTicketCleanup", value: "yes" }
        
        # GSSAPI
        - { key: "GSSAPIAuthentication", value: "no" }
        - { key: "GSSAPICleanupCredentials", value: "yes" }
        
        # Rhosts & Host-based
        - { key: "IgnoreRhosts", value: "yes" }
        - { key: "IgnoreUserKnownHosts", value: "yes" }
        - { key: "HostbasedAuthentication", value: "no" }
        
        # Environment & Privilege
        - { key: "PermitUserEnvironment", value: "no" }
        - { key: "UsePAM", value: "yes" }
        
        # Forwarding & Tunnels
        - { key: "AllowTcpForwarding", value: "no" }
        - { key: "AllowAgentForwarding", value: "no" }
        - { key: "GatewayPorts", value: "no" }
        - { key: "PermitTunnel", value: "no" }
        - { key: "X11Forwarding", value: "no" }
        - { key: "X11UseLocalhost", value: "yes" }
        
        # Session & Keepalive
        - { key: "TCPKeepAlive", value: "no" }
        - { key: "ClientAliveInterval", value: "300" }
        - { key: "ClientAliveCountMax", value: "3" }
        - { key: "MaxStartups", value: "10:30:60" }
        
        # Display
        - { key: "PrintMotd", value: "no" }
        - { key: "PrintLastLog", value: "no" }
        - { key: "Banner", value: "none" }
        - { key: "DebianBanner", value: "no" }
        
        # Locale
        - { key: "AcceptEnv", value: "LANG LC_*" }
        
        # Subsystem
        - { key: "Subsystem", value: "sftp /usr/lib/openssh/sftp-server" }
      notify: Restart SSH service

    - name: Set permissions on /etc/ssh directory
      file:
        path: /etc/ssh
        mode: '0755'
        owner: root
        group: root

    - name: Set permissions on sshd_config file
      file:
        path: /etc/ssh/sshd_config
        mode: '0600'
        owner: root
        group: root

    - name: Validate sshd_config syntax
      block:
        - name: Test sshd configuration
          command: sshd -t
          register: sshd_validation
          changed_when: false

        - name: Configuration is valid
          debug:
            msg: "✓ SSH configuration is valid and ready to apply"

      rescue:
        - name: Configuration validation failed
          debug:
            msg: "✗ SSH configuration has errors. Rolling back..."

        - name: Restore backup configuration
          copy:
            src: /etc/ssh/sshd_config.bak.{{ ansible_date_time.iso8601_basic_short }}
            dest: /etc/ssh/sshd_config
            remote_src: yes
            owner: root
            group: root
            mode: '0600'

        - name: Fail the playbook
          fail:
            msg: "SSH configuration validation failed. Original config restored. Check /etc/ssh/sshd_config.bak for details"

  handlers:
    - name: Restart SSH service
      systemd:
        name: ssh
        state: restarted
        enabled: yes
      listen: Restart SSH service

  post_tasks:
    - name: Verify SSH service is running
      systemd:
        name: ssh
        state: started
      register: ssh_status

    - name: Display completion message
      debug:
        msg: |
          ✓ SSH hardening completed successfully
          ✓ SSH is running on port 64100
          ✓ Configuration backed up to: /etc/ssh/sshd_config.bak.{{ ansible_date_time.iso8601_basic_short }}
          ⚠ Update your ansible inventory to use port 64100 for future connections
